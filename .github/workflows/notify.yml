name: Notify Main Repo

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: Stamps Sync
    steps:
      - name: Trigger stamp sync
        run: |
          gh api repos/Happynico7504/spotify-wiiu/dispatches \
            -f event_type=stamps-updated
        env:
          GH_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
